name: macOS build and test rolesanywhere-credential-helper

on:
  push:
    branches: [ main ]

permissions:
  statuses: write
  id-token: write

jobs:
  macOS:
    name: Build on ${{matrix.display_name}}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # - arch: "X86_64"
          #   display_name: "macOS X86_64"
          #   runner: "macos-13"
          #   goarch: "amd64"
          #   s3_path_secret: "MACOS_X86_64_S3_PATH"
          # 
          - arch: "Aarch64"
            display_name: "macOS Aarch64"
            runner: "macos-14"
            goarch: "arm64"
            s3_path_secret: "MACOS_AARCH64_S3_PATH"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get Go version from go.mod
        id: go-version
        run: |
          GO_VERSION=$(grep '^toolchain' go.mod | awk '{print $2}' | sed 's/go//')
          echo "version=${GO_VERSION}" >> $GITHUB_OUTPUT
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ steps.go-version.outputs.version }}
      
      - name: Install PKCS#11 dependencies
        run: |
          # Install SoftHSM, p11-kit, and pkg-config for PKCS#11 support
          brew install softhsm p11-kit pkg-config opensc
      
      - name: Configure SoftHSM for testing
        run: |
          # Set up SoftHSM configuration for PKCS#11 tests
          mkdir -p /tmp/softhsm-tokens
          
          cat > /tmp/softhsm2.conf << EOF
          directories.tokendir = /tmp/softhsm-tokens
          objectstore.backend = file
          log.level = INFO
          EOF
          
          export SOFTHSM2_CONF=/tmp/softhsm2.conf
          
          # Initialize test token
          softhsm2-util --init-token --free --label "test-token" --pin 1234 --so-pin 1234
          
          echo "SOFTHSM2_CONF=/tmp/softhsm2.conf" >> $GITHUB_ENV
      
      - name: Build with CGo enabled
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          # Build with CGo enabled for PKCS#11 support
          make release
      
      - name: Verify binary architecture
        run: |
          echo "Verifying binary architecture..."
          file build/bin/aws_signing_helper
          lipo -info build/bin/aws_signing_helper || true
      
      - name: Test PKCS#11 functionality
        run: |
          # Run PKCS#11 unit tests to verify functionality
          export PKCS11_MODULE=$(pkg-config --variable=libdir softhsm2)/softhsm/libsofthsm2.dylib
          
          # If pkg-config doesn't work, try common paths
          if [ ! -f "$PKCS11_MODULE" ]; then
            if [ -f "/opt/homebrew/lib/softhsm/libsofthsm2.dylib" ]; then
              export PKCS11_MODULE="/opt/homebrew/lib/softhsm/libsofthsm2.dylib"
            elif [ -f "/usr/local/lib/softhsm/libsofthsm2.dylib" ]; then
              export PKCS11_MODULE="/usr/local/lib/softhsm/libsofthsm2.dylib"
            fi
          fi
          
          echo "Using PKCS11_MODULE: $PKCS11_MODULE"
          
          # Run PKCS#11 tests
          go test ./... -run "PKCS11" -v || echo "Warning: PKCS#11 tests failed, but continuing build"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.2.0
        with:
          role-to-assume: ${{ secrets.BINARY_BUILDING_ROLE_ARN }}
          role-session-name: githubmacosbuild
          aws-region: us-west-2
      
      - name: Upload to S3
        id: s3
        run: |
          S3_DESTINATION="s3://${{ secrets.INTERMEDIATE_BUCKET_NAME }}"
          S3_PATH=${{ secrets[matrix.s3_path_secret] }}
          
          aws s3 cp build/bin/aws_signing_helper "${S3_DESTINATION}/${S3_PATH}/aws_signing_helper"

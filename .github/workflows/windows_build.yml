name: Windows build and test rolesanywhere-credential-helper

on:
  push:
    branches: [ main ]

permissions:
  statuses: write
  id-token: write

jobs:
  Windows:
    name: Build on ${{matrix.display_name}}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: "X86_64"
            display_name: "Windows X86_64"
            runner: "windows-2022"
            goarch: "amd64"
            s3_path_secret: "WINDOWS_X86_64_S3_PATH"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Go version from go.mod
        id: go-version
        shell: bash
        run: |
          GO_VERSION=$(grep '^toolchain' go.mod | awk '{print $2}' | sed 's/go//')
          echo "version=${GO_VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ steps.go-version.outputs.version }}

      - name: Install PKCS#11 dependencies
        shell: powershell
        run: |
          # Install SoftHSM2 for PKCS#11 support
          choco install softhsm -y
          
          # Refresh environment to get updated PATH
          $env:ChocolateyInstall = Convert-Path "$((Get-Command choco).Path)\..\.."
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          
          # Find SoftHSM installation
          $possiblePaths = @(
            "C:\Program Files\SoftHSM2\bin\softhsm2-util.exe",
            "C:\Program Files (x86)\SoftHSM2\bin\softhsm2-util.exe",
            "C:\SoftHSM2\bin\softhsm2-util.exe",
            "C:\ProgramData\chocolatey\lib\softhsm\tools\bin\softhsm2-util.exe"
          )
          
          $softhsmPath = $null
          foreach ($path in $possiblePaths) {
            if (Test-Path $path) {
              $softhsmPath = $path
              Write-Host "Found SoftHSM2 at: $path"
              break
            }
          }
          
          if (-not $softhsmPath) {
            Write-Host "Searching for softhsm2-util.exe..."
            $found = Get-ChildItem -Path "C:\" -Filter "softhsm2-util.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $softhsmPath = $found.FullName
              Write-Host "Found SoftHSM2 at: $softhsmPath"
            }
          }
          
          if (-not $softhsmPath) {
            Write-Host "ERROR: SoftHSM2 installation failed - softhsm2-util.exe not found"
            exit 1
          }
          
          # Store paths for later steps
          $softhsmDir = Split-Path (Split-Path $softhsmPath -Parent) -Parent
          echo "SOFTHSM_DIR=$softhsmDir" >> $env:GITHUB_ENV
          echo "SOFTHSM_UTIL=$softhsmPath" >> $env:GITHUB_ENV
          
          Write-Host "SoftHSM2 installed successfully at: $softhsmDir"

      - name: Configure SoftHSM for testing
        shell: powershell
        run: |
          # Set up SoftHSM configuration
          New-Item -ItemType Directory -Force -Path "C:\Temp\softhsm-tokens"
          
          $configContent = @"
directories.tokendir = C:\Temp\softhsm-tokens
objectstore.backend = file
log.level = INFO
"@
          
          $configPath = "C:\Temp\softhsm2.conf"
          $configContent | Out-File -FilePath $configPath -Encoding ASCII
          
          # Set environment variable
          echo "SOFTHSM2_CONF=$configPath" >> $env:GITHUB_ENV
          $env:SOFTHSM2_CONF = $configPath
          
          # Initialize test token
          Write-Host "Initializing test token..."
          & $env:SOFTHSM_UTIL --init-token --free --label "test-token" --pin 1234 --so-pin 1234
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Warning: Token initialization failed, but continuing..."
          } else {
            Write-Host "Test token initialized successfully"
          }

      - name: Set PKCS11 module path
        shell: powershell
        run: |
          # Find the PKCS11 module DLL
          $possibleModules = @(
            "$env:SOFTHSM_DIR\lib\softhsm2-x64.dll",
            "$env:SOFTHSM_DIR\lib\softhsm2.dll",
            "C:\Program Files\SoftHSM2\lib\softhsm2-x64.dll",
            "C:\ProgramData\chocolatey\lib\softhsm\tools\lib\softhsm2-x64.dll"
          )
          
          $moduleFound = $false
          foreach ($module in $possibleModules) {
            if (Test-Path $module) {
              echo "PKCS11_MODULE=$module" >> $env:GITHUB_ENV
              Write-Host "Found PKCS11 module at: $module"
              $moduleFound = $true
              break
            }
          }
          
          if (-not $moduleFound) {
            Write-Host "Searching for softhsm2 DLL..."
            $found = Get-ChildItem -Path "C:\" -Filter "softhsm2*.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $module = $found.FullName
              echo "PKCS11_MODULE=$module" >> $env:GITHUB_ENV
              Write-Host "Found PKCS11 module at: $module"
            } else {
              Write-Host "Warning: PKCS11 module not found, tests may fail"
            }
          }

      - name: Build with CGo enabled
        shell: bash
        env:
          CGO_ENABLED: 1 
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          make release

      - name: Test PKCS#11 functionality
        shell: powershell
        run: |
          Write-Host "PKCS11_MODULE: $env:PKCS11_MODULE"
          Write-Host "SOFTHSM2_CONF: $env:SOFTHSM2_CONF"
          
          if ($env:PKCS11_MODULE -and (Test-Path $env:PKCS11_MODULE)) {
            try {
              go test ./... -run "PKCS11" -v
              Write-Host "PKCS#11 tests completed"
            } catch {
              Write-Host "Warning: PKCS#11 tests failed, but continuing build"
              Write-Host "Error: $_"
            }
          } else {
            Write-Host "Skipping PKCS#11 tests - module not available"
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.2.0
        with:
          role-to-assume: ${{ secrets.BINARY_BUILDING_ROLE_ARN }}
          role-session-name: githubwindowsbuild
          aws-region: us-west-2

      - name: Upload to S3
        id: s3
        shell: bash
        run: |
          S3_DESTINATION="s3://${{ secrets.INTERMEDIATE_BUCKET_NAME }}"
          S3_PATH=${{ secrets[matrix.s3_path_secret] }}
          aws s3 cp build/bin/aws_signing_helper.exe "${S3_DESTINATION}/${S3_PATH}/aws_signing_helper.exe"
